# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=PingMe-Utility-Service
spring.jmx.enabled=false
spring.main.banner-mode=off
spring.main.lazy-initialization=true
spring.threads.virtual.enabled=true
server.port=8080
# ===============================================================
# MAIL
# ===============================================================
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=mail49.vietnix.vn
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.debug=true
spring.thymeleaf.cache=true
# ===============================================================
# SECURITY
# ===============================================================
app.internal.secret=${APP_INTERNAL_SECRET}
# ===============================================================
# WEB / MVC CONFIGURATION
# ===============================================================
## JSON Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# ===============================================================
# OBSERVABILITY
# ===============================================================
## Actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=false
management.endpoint.health.probes.enabled=true
management.endpoint.health.status.http-mapping.UP=200
management.endpoint.health.status.http-mapping.DOWN=503
### Kafka
# Settings
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVER}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
logging.level.org.apache.kafka.clients.consumer.internals.FetchCollector=ERROR
# Topic
spring.kafka.topic.user-create-dev=${USER_CREATE_TOPIC}
spring.kafka.topic.listen-music-dev=${LISTEN_MUSIC_TOPIC}
spring.kafka.topic.user-chat-dev=${USER_CHAT_TOPIC}
## NoSQL - MongoDB
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.representation.uuid=standard
spring.data.mongodb.auto-index-creation=true