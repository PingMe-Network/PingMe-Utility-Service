# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=PingMe-Utility-Service
spring.jmx.enabled=false
spring.main.banner-mode=off
spring.main.lazy-initialization=true
spring.threads.virtual.enabled=true
server.port=${PORT}
# ===============================================================
# MAIL
# ===============================================================
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=mail49.vietnix.vn
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.timeout=5
spring.mail.properties.mail.debug=false
spring.thymeleaf.cache=true
# ===============================================================
# SECURITY
# ===============================================================
app.internal.secret=${APP_INTERNAL_SECRET}
# ===============================================================
# WEB / MVC CONFIGURATION
# ===============================================================
## JSON Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# ===============================================================
# OBSERVABILITY
# ===============================================================
## Actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=false
management.endpoint.health.probes.enabled=true
management.endpoint.health.status.http-mapping.UP=200
management.endpoint.health.status.http-mapping.DOWN=503
